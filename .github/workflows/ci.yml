name: CI Pipeline

on:
  push:
    branches:

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv venv && uv sync --all-extras

      - name: Install project as editable
        run: uv pip install -e .

      - name: Run ruff (lint)
        run: uv run ruff check .

  build:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv venv && uv sync --all-extras

      - name: Install project + pyinstaller
        run: uv pip install -e .[dev]

      - name: Build EXE
        run: uv run pyinstaller --onefile --name stock_scanner stock_scanner/main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock_scanner-exe
          path: dist/stock_scanner.exe
          
  tests:
    name: Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv venv && uv sync --all-extras

      - name: Install project as editable
        run: uv pip install -e .

      - name: Run tests
        run: uv run pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

